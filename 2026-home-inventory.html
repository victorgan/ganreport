document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ter-spacing:.04em\">NEW PLACE IN {{ addParentLabel }}:<\u002Fdiv>\n              <input value=\"{{ newPlaceName }}\" onchange=\"{{ onNewPlaceName }}\" data-newplace-input=\"1\" placeholder=\"e.g. Shelf B, Blue bin, Travel duffel…\" style=\"flex:1;padding:9px 12px;border:1px solid #E2DBD0;border-radius:9px;background:#fff;font:400 13px 'Schibsted Grotesk';outline:none\" style-focus=\"border-color:#1F1B16\">\n              <label style=\"display:flex;align-items:center;gap:6px;font:400 11px 'Space Mono',monospace;color:#6B635A;cursor:pointer;user-select:none;white-space:nowrap\"><input type=\"checkbox\" checked=\"{{ newPlaceIsKit }}\" onchange=\"{{ toggleNewPlaceKit }}\" style=\"accent-color:#5B7B8C;margin:0\">KIT — it moves (bag, case…)<\u002Flabel>\n              <div onclick=\"{{ confirmAddPlace }}\" style=\"padding:9px 14px;border-radius:9px;background:{{ accent }};color:#fff;font:600 13px 'Schibsted Grotesk';cursor:pointer\" style-hover=\"filter:brightness(.94)\">Add<\u002Fdiv>\n              <div onclick=\"{{ cancelAddPlace }}\" style=\"padding:9px 12px;border-radius:9px;border:1px solid #E2DBD0;color:#6B635A;font:600 13px 'Schibsted Grotesk';cursor:pointer\" style-hover=\"background:#F2ECE3\">Cancel<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ openAdd }}\" style=\"position:fixed;right:16px;bottom:90px;z-index:35;width:56px;height:56px;border-radius:50%;background:{{ accent }};color:#fff;display:flex;align-items:center;justify-content:center;font:400 30px/1 'Schibsted Grotesk';box-shadow:0 8px 24px rgba(31,27,22,.3);cursor:pointer\" style-active=\"transform:scale(.94)\">+<\u002Fdiv>\n    <nav style=\"position:fixed;left:0;right:0;bottom:0;z-index:34;display:flex;background:#EDE7DD;border-top:1px solid #E1DACE;padding:5px 6px calc(5px + env(safe-area-inset-bottom))\">\n one\" style-hover=\"background:#F2ECE3\">−<\u002Fdiv>\n              <div data-delta=\"1\" onclick=\"{{ adjustQty }}\" style=\"width:44px;height:44px;border-radius:10px;border:1px solid #E2DBD0;display:flex;align-items:center;justify-content:center;cursor:pointer;font:400 20px/1 'Schibsted Grotesk';color:#6B635A;user-select:none\" style-hover=\"background:#F2ECE3\">+<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E9E3DA;border-radius:12px;padding:13px 15px;margin-top:12px\">\n            <div style=\"flex-shrink:0\">\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.06em\">MOVE TO<\u002Fdiv>\n            <\u002Fdiv>\n            {{ moveSelectEl }}\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:10px;background:#F3F6F7;border:1px solid #DDE7EA;border-radius:12px;padding:13px 15px;margin-top:12px\">\n            <div style=\"display:flex;align-items:center;gap:8px\">\n              <div style=\"flex-shrink:0;font:400 10px 'Space Mono',monospace;color:#5B7B8C;letter-spacing:.06em\">CURRENTLY AT<\u002Fdiv>\n              {{ packSelectEl }}\n            <\u002Fdiv>\n            <sc-if value=\"{{ selected.isAway }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <div style=\"flex:1;font:400 11px 'Space Mono',monospace;color:#5B7B8C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ selected.currentLabelFull }}<\u002Fdiv>\n                <div data-id=\"{{ selected.id }}\" onclick=\"{{ makeHomeHere }}\" style=\"flex-shrink:0;font:600 11px 'Space Mono',monospace;color:#6B635A;cursor:pointer;letter-spacing:.03em\" style-hover=\"color:#1F1B16;text-decoration:underline\">MAKE THIS ITS HOME<\u002Fdiv>\n                <div data-id=\"{{ selected.id }}\" onclick=\"{{ putBack }}\" style=\"flex-sh color:#7E6A8A;font:600 13px 'Schibsted Grotesk';cursor:pointer\" style-hover=\"background:#F0EAF4\">Lend →<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ selected.hasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:18px\">\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.08em;margin-bottom:7px\">NOTES<\u002Fdiv>\n              <div style=\"font:400 14px/1.55 'Schibsted Grotesk';color:#3A342C;background:#F6F1EA;border-radius:11px;padding:14px\">{{ selected.notes }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"flex-shrink:0;padding:16px 24px;border-top:1px solid #E6DFD4;display:flex;gap:10px\">\n          <div data-id=\"{{ selected.id }}\" onclick=\"{{ deleteItem }}\" style=\"flex-shrink:0;width:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid #E6C9BC;color:#BD5D3A;cursor:pointer;font:400 17px 'Schibsted Grotesk'\" style-hover=\"background:#FBEDE6\" title=\"Delete item\">🗑<\u002Fdiv>\n          <div data-id=\"{{ selected.id }}\" onclick=\"{{ openEdit }}\" style=\"flex:1;text-align:center;padding:12px;border-radius:10px;border:1px solid #DAD2C6;color:#1F1B16;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"background:#F2ECE3\">Edit details<\u002Fdiv>\n          <div onclick=\"{{ closeDetail }}\" style=\"flex:1;text-align:center;padding:12px;border-radius:10px;background:#1F1B16;color:#F4F0E9;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"filter:brightness(1.25)\">Done<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div onclick=\"{{ closeForm }}\" style=\"position:absolute;inset:0;background:rgba(31,27,22,.34);animation:fadeIn .2s ease\"><\u002Fdiv>\n      <div style=\"{{ modalCardStyle }}\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px\">\n          <div style=\"font:700 19px 'Schibsted Grotesk'\">{{ formTitle }}<\u002Fdiv>\n          <div onclick=\"{{ closeForm }}\" style=\"width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B635A;font:400 19px/1 'Schibsted Grotesk';background:#F2ECE3\" style-hover=\"background:#E7DFD3\">×<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div>\n            <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">ITEM NAME<\u002Fdiv>\n            <input name=\"name\" value=\"{{ form.name }}\" onchange=\"{{ onForm }}\" placeholder=\"e.g. Bluetooth speaker\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">CATEGORY<\u002Fdiv>\n              {{ catSelectEl }}\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">PLACE<\u002Fdiv>\n              {{ placeSelectEl }}\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"{{ formRow4Style }}\">\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">QTY<\u002Fdiv>\n              <input name=\"qty\" type=\"number\" min=\"0\" value=\"{{ form.qty }}\" onchange=\"{{ onForm }}\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">UNIT $<\u002Fdiv>\n              <input name=\"value\" type=\"number\" min=\"0\" value=\"{{ form.value }}\" onchange=\"{{ onForm }}\" placeholder=\"0\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">RESTOCK AT<\u002Fdiv>\n              <input name=\"min\" type=\"number\" min=\"0\" value=\"{{ form.min }}\" onchange=\"{{ onForm }}\" placeholder=\"—\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">CONDITION<\u002Fdiv>\n              {{ condSelectEl }}\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">WARRANTY / EXPIRY DATE<\u002Fdiv>\n              <input name=\"warranty\" type=\"date\" value=\"{{ form.warranty }}\" onchange=\"{{ onForm }}\" style=\"width:100%;padding:10px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">TAGS (COMMA-SEPARATED)<\u002Fdiv>\n              <input name=\"tags\" value=\"{{ form.tags }}\" onchange=\"{{ onForm }}\" placeholder=\"travel, fragile\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">NOTES<\u002Fdiv>\n            <textarea name=\"notes\" value=\"{{ form.notes }}\" onchange=\"{{ onForm }}\" rows=\"2\" placeholder=\"Optional — serial number, warranty, where you bought it…\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 14px 'Schibsted Grotesk';color:#1F1B16;outline:none;resize:vertical\" style-focus=\"border-color:#1F1B16\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:10px;margin-top:22px\">\n          <div onclick=\"{{ closeForm }}\" style=\"flex:1;text-align:center;padding:12px;border-radius:10px;border:1px solid #E2DBD0;color:#6B635A;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"background:#F2ECE3\">Cancel<\u002Fdiv>\n          <div onclick=\"{{ submitForm }}\" style=\"flex:1.4;text-align:center;padding:12px;border-radius:10px;background:{{ accent }};color:#fff;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"filter:brightness(.94)\">{{ formCta }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showSync }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div onclick=\"{{ closeSync }}\" style=\"position:absolute;inset:0;background:rgba(31,27,22,.34);animation:fadeIn .2s ease\"><\u002Fdiv>\n      <div style=\"{{ modalCardStyle }}\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n          <div style=\"font:700 19px 'Schibsted Grotesk'\">Sync to a Google Sheet<\u002Fdiv>\n          <div onclick=\"{{ closeSync }}\" style=\"width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B635A;font:400 19px/1 'Schibsted Grotesk';background:#F2ECE3\" style-hover=\"background:#E7DFD3\">×<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:400 12px 'Space Mono',monospace;color:#9A9085;margin-bottom:16px\">{{ syncMsg }}<\u002Fdiv>\n\n        <div style=\"font:400 14px/1.6 'Schibsted Grotesk';color:#3A342C;background:#F6F1EA;border-radius:12px;padding:14px 16px;margin-bottom:18px\">\n          Your inventory is stored as <b>real rows<\u002Fb> in a private Sheet — an <b>Items<\u002Fb> tab (one row per item, with its full place path), a <b>Places<\u002Fb> tab (the room/container tree). Sort it, filter it, edit it: changes you make in the Sheet load back into Stockpile.\n          <div style=\"margin-top:10px;font:400 12px/1.7 'Space Mono',monospace;color:#6B635A\">\n            ONE-TIME SETUP<br>\n            1 · Create a Sheet → Extensions → Apps Script<br>\n            2 · Paste the contents of <b>home-inventory-sync.gs<\u002Fb> (provided alongside this app)<br>\n            3 · Set your own TOKEN in the script<br>\n            4 · Deploy → Web app · execute as <b>Me<\u002Fb> · access <b>Anyone<\u002Fb><br>\n            5 · Paste the /exec URL and token below\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div>\n            <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">APPS SCRIPT WEB APP URL<\u002Fdiv>\n            <input value=\"{{ syncUrl }}\" onchange=\"{{ onSyncUrl }}\" placeholder=\"https://script.google.com/macros/s/…/exec\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 13px 'Space Mono',monospace;color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font:400 10px 'Space Mono',monospace;color:#9A9085;letter-spacing:.07em;margin-bottom:6px\">TOKEN<\u002Fdiv>\n            <input type=\"password\" value=\"{{ syncToken }}\" onchange=\"{{ onSyncToken }}\" placeholder=\"the secret you set in the script\" style=\"width:100%;padding:11px 13px;border:1px solid #E2DBD0;border-radius:10px;background:#fff;font:400 13px 'Space Mono',monospace;color:#1F1B16;outline:none\" style-focus=\"border-color:#1F1B16\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:10px;margin-top:22px\">\n          <sc-if value=\"{{ syncConnected }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ disconnectSync }}\" style=\"flex:0 0 auto;text-align:center;padding:12px 14px;border-radius:10px;border:1px solid #E6C9BC;color:#BD5D3A;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"background:#FBEDE6\">Disconnect<\u002Fdiv>\n          <\u002Fsc-if>\n          <div onclick=\"{{ testSync }}\" style=\"flex:1;text-align:center;padding:12px;border-radius:10px;border:1px solid #E2DBD0;color:#6B635A;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"background:#F2ECE3\">Test<\u002Fdiv>\n          <div onclick=\"{{ saveSyncNow }}\" style=\"flex:1.4;text-align:center;padding:12px;border-radius:10px;background:{{ accent }};color:#fff;cursor:pointer;font:600 14px 'Schibsted Grotesk'\" style-hover=\"filter:brightness(.94)\">Save &amp; sync<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"{{ toastStyle }}\">\n      <span style=\"font:500 14px 'Schibsted Grotesk'\">{{ toastText }}<\u002Fspan>\n      <div onclick=\"{{ undoDelete }}\" style=\"font:700 13px 'Schibsted Grotesk';color:#E8A188;cursor:pointer;padding:4px 8px;border-radius:7px\" style-hover=\"background:rgba(255,255,255,.1)\">Undo<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7E6A8A&quot;,&quot;options&quot;:[&quot;#BD5D3A&quot;,&quot;#2A6FDB&quot;,&quot;#1F8A5B&quot;,&quot;#7E6A8A&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Comfortable&quot;,&quot;options&quot;:[&quot;Comfortable&quot;,&quot;Compact&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showValues&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  catMeta = {\n    Electronics:{color:'#6B7E8A'}, Kitchen:{color:'#B07A4B'}, Tools:{color:'#8A7A5C'},\n    Supplies:{color:'#BD5D3A'}, Books:{color:'#7E6A8A'}, Clothing:{color:'#9A6E6E'},\n    Outdoors:{color:'#6F8A6F'}, Documents:{color:'#86837C'}, Furniture:{color:'#5C7A7A'}\n  };\n  condMeta = { Excellent:'#5E8A6A', Good:'#86837C', Fair:'#B07A4B', Poor:'#BD5D3A' };\n  LS_ITEMS = 'stockpile-v3-items';\n  LS_LOCS = 'stockpile-v3-locs';\n\n  seedLocs = [\n    {id:'office',parentId:null,name:'Office'},\n    {id:'office-desk',parentId:'office',name:'Desk drawers'},\n    {id:'office-shelf',parentId:'office',name:'Bookshelf'},\n    {id:'kitchen',parentId:null,name:'Kitchen'},\n    {id:'kitchen-pantry',parentId:'kitchen',name:'Pantry'},\n    {id:'garag ty);\n    else if(s.sort==='location') f=f.slice().sort((a,b)=>this.pathNames(a.locId).join('/').localeCompare(this.pathNames(b.locId).join('/'))||a.name.localeCompare(b.name));\n    else f=f.slice().sort((a,b)=>b.added.localeCompare(a.added));\n    const cards=f.map(it=>this.decorate(it));\n\n    // stats\n    const totalUnits=items.reduce((n,i)=>n+i.qty,0);\n    const totalValue=items.reduce((n,i)=>n+i.qty*i.value,0);\n    const cats=[...new Set(items.map(i=>i.category))];\n    const lows=items.filter(i=>i.min>0&&i.qty<=i.min);\n    const lents=items.filter(i=>i.lentTo&&i.lentTo.trim());\n    const aways=items.filter(i=>this.isAwayItem(i));\n    const expiring=items.filter(i=>{ const d=this.daysUntil(i.warranty); return d!==null&&d<=60; });\n    const attnList=[...new Map([...lents,...lows,...expiring].map(i=>[i.id,i])).values()];\n    const stats={ totalValueFmt:this._show?this.money(totalValue):'••••••', unitsLabel:totalUnits+' units total', attnCount:attnList.length };\n\n    const statStyle='background:#fff;border:1px solid #E9E3DA;border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s';\n    const rootLocs=this.locChildren(null);\n    const statCards=[\n      {label:'TOTAL ITEMS',value:String(items.length),sub:totalUnits+' units',color:'#1F1B16',view:'inventory',style:statStyle},\n      {label:'EST. WORTH',value:stats.totalValueFmt,sub:'replacement value',color:'#1F1B16',view:'inventory',style:statStyle},\n      {label:'PLACES',value:String(s.locs.length),sub:rootLocs.length+' rooms',color:'#1F1B16',view:'places',style:statStyle},\n      {label:'AWAY',value:String(aways.length),sub:'not where they live',color:aways.length?'#5B7B8C':'#1F1B16',view:'away',style:statStyle},\n      {label:'ON LOAN',value:String(lents.length),sub:lents.length?('to '+[...new Set(lents.map(l=>l.lentTo))].join(', ')):'nothing lent out',color:lents.length?'#7E6A8A':'#1F1B16',view:'loans',style:statStyle},\n      {label:'LOW STOCK',value:String(lows.length),sub:'ne
