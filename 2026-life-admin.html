document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

         <div style=\"{{ d.cardStyle }}\" style-hover=\"transform:translateY(-3px)\">\n                    <button data-id=\"{{ d.id }}\" onclick=\"{{ onCardDone }}\" disabled=\"{{ d.disabled }}\" aria-label=\"{{ d.aria }}\" style=\"display:flex;flex-direction:column;align-items:center;width:100%;box-sizing:border-box;background:none;border:0;color:#eef0ea;cursor:pointer;padding:18px 12px 13px;font-family:inherit;text-align:center;border-radius:18px\">\n                      <div style=\"{{ d.ringBox }}\">\n                        <div style=\"{{ d.ringStyle }}\"><\u002Fdiv>\n                        <div style=\"position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(rgba(10,13,17,.5) 0deg 2deg,transparent 2deg 30deg);-webkit-mask:radial-gradient(closest-side,transparent 71%,#000 72%);mask:radial-gradient(closest-side,transparent 71%,#000 72%);pointer-events:none\"><\u002Fdiv>\n                        <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px\">\n                          <span style=\"{{ d.iconStyle }}\"><\u002Fspan>\n                          <span style=\"{{ d.centerStyle }}\">{{ d.centerTxt }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font:600 14px/1.25 'Instrument Sans',sans-serif;margin-bottom:4px\">{{ d.label }}<\u002Fdiv>\n                      <div style=\"{{ d.metaStyle }}\">{{ d.meta }}<\u002Fdiv>\n                      <sc-if value=\"{{ d.hasTags }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:8px\">\n                          <sc-for list=\"{{ d.tags }}\" as=\"t\" hint-placeholder-count=\"1\"><span style=\"{{ t.style }}\">{{ t.label }}<\u002Fspan><\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ d.hasChainTag }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font:400 9px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#636b75;margin-top:7px\">{{ d.chainTag }}<\u002Fdiv>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ d.hasHint }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"{{ d.hintStyle }}\">{{ d.hint }}<\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fbutton>\n                    <button data-id=\"{{ d.id }}\" onclick=\"{{ onCardEdit }}\" aria-label=\"Details: {{ d.label }}\" style=\"position:absolute;top:6px;right:6px;width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:transparent;border:0;color:#636b75;cursor:pointer;font:700 14px 'IBM Plex Mono',monospace\" style-hover=\"background:#232a34;color:#eef0ea\">···<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ m.empty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font:400 10.5px 'IBM Plex Mono',monospace;color:#636b75;padding:4px 2px\">nothing here<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <div style=\"margin-top:70px;padding-top:22px;border-top:1px solid rgba(238,240,234,.05);color:#636b75;font:400 11px/1.7 'IBM Plex Mono',monospace;letter-spacing:.02em\">\n    <b style=\"color:#9aa2ac;font-weight:500\">How it works.<\u002Fb> Tap a card to mark it done; its ring refills, then empties again — over a rolling interval, or toward a fixed date each year for the tax and benefits jobs. Nothing goes overdue or piles up, so skip whatever you like. <b style=\"color:#9aa2ac;font-weight:500\">Priority<\u002Fb> is cost-of-skipping: <i>Needs<\u002Fi> warm up early and surface up top, <i>Upkeep<\u002Fi> nudges only when due, <i>Wants<\u002Fi> stay dim and never glow. Some cards <b style=\"color:#9aa2ac;font-weight:500\">cascade<\u002Fb> — a chain walks one step at a time, a deep clean refills the weekly one, and a gated task waits until its prerequisite is fresh. Tap the dots to adjust or remove.<br>\n    <b style=\"color:#9aa2ac;font-weight:500\">The money numbers<\u002Fb> use 2026 IRS limits (401k $24,500, total $72,000, IRA $7,500, HSA $4,400, FSA $3,400). Anything employer-specific — the match, reimbursements, exact dates — changes, so check your benefits portal. None of this is financial advice.<br>\n    <b style=\"color:#9aa2ac;font-weight:500\">Everything saves to this browser<\u002Fb> — Export for a backup, or use <b style=\"color:#9aa2ac;font-weight:500\">Sync<\u002Fb> to keep the truth in a private Google Sheet. Keys: <b style=\"color:#9aa2ac;font-weight:500\">/<\u002Fb> search · <b style=\"color:#9aa2ac;font-weight:500\">N<\u002Fb> new · <b style=\"color:#9aa2ac;font-weight:500\">ESC<\u002Fb> close.\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;align-items:center;justify-content:space-around;background:rgba(14,18,23,.94);backdrop-filter:blur(10px);border-top:1px solid rgba(238,240,234,.08);padding:10px 14px calc(10px + env(safe-area-inset-bottom))\">\n    <button data-tab=\"rhythms\" onclick=\"{{ onTab }}\" style=\"{{ navRhythmStyle }}\">On repeat<\u002Fbutton>\n    <button onclick=\"{{ openAddH }}\" aria-label=\"Add a routine\" style=\"width:52px;height:52px;border-radius:50%;background:#c8a24b;color:#1a1206;border:0;font:600 26px/1 'Instrument Sans',sans-serif;cursor:pointer;box-shadow:0 6px 18px -6px rgba(200,162,75,.5)\">+<\u002Fbutton>\n    <button data-tab=\"year\" onclick=\"{{ onTab }}\" style=\"{{ navYearStyle }}\">Calendar<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ sheetOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeSheetH }}\" style=\"position:fixed;inset:0;background:rgba(5,8,11,.66);backdrop-filter:blur(4px);z-index:40;animation:fadeIn .2s ease\"><\u002Fdiv>\n  <div role=\"dialog\" aria-modal=\"true\" data-screen-label=\"Sheet\" style=\"{{ sheetStyle }}\">\n\n    <sc-if value=\"{{ isTaskSheet }}\" hint-placeholder-val=\"{{ false }}\">\n      <h3 style=\"font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:26px;margin:0 0 3px;color:#eef0ea\">{{ sheetTitle }}<\u002Fh3>\n      <div style=\"font:400 11px 'IBM Plex Mono',monospace;color:#9aa2ac;margin-bottom:18px;letter-spacing:.02em\">{{ sheetSub }}<\u002Fdiv>\n      <sc-if value=\"{{ hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"color:#9aa2ac;font-size:14px;line-height:1.55;margin:0 0 18px\">{{ noteText }}<\u002Fp>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showNameArea }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-bottom:16px\">\n          <div style=\"font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:#636b75;margin-bottom:8px\">Name<\u002Fdiv>\n          <input type=\"text\" value=\"{{ draftName }}\" onchange=\"{{ dName }}\" placeholder=\"e.g. Service the bike, renew passport\" style=\"width:100%;box-sizing:border-box;background:#12161c;border:1px solid rgba(238,240,234,.12);border-radius:10px;color:#eef0ea;font:400 14px 'Instrument Sans',sans-serif;padding:11px 12px;outline:none\" style-focus=\"border-color:#c8a24b\">\n        <\u002Fdiv>\n        <div style=\"margin-bottom:16px\">\n          <div style=\"font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:#636b75;margin-bottom:8px\">Area<\u002Fdiv>\n          <select value=\"{{ draftArea }}\" onchange=\"{{ dArea }}\" style=\"width:100%;box-sizing:border-box;background:#12161c;border:1px solid rgba(238,240,234,.12);border-radius:10px;color:#eef0ea;font:400 14px 'Instrument Sans',sans-serif;padding:11px 12px;outline:none\">\n            <sc-for list=\"{{ areaOptions }}\" as=\"o\" hint-placeholder-count=\"4\"><option value=\"{{ o.v }}\">{{ o.t }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:16px\">\n          <div style=\"font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:#636b75;margin-bottom:8px\">Icon<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px;max-height:118px;overflow-y:auto;padding:2px\">\n            <sc-for list=\"{{ iconChips }}\" as=\"ic\" hint-placeholder-count=\"10\">\n              <button data-icon=\"{{ ic.k }}\" onclick=\"{{ dIcon }}\" title=\"{{ ic.k }}\" aria-label=\"{{ ic.k }}\" style=\"{{ ic.style }}\"><span style=\"{{ ic.iconStyle }}\"><\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"margin-bottom:16px\">\n        <div style=\"font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:#636b75;margin-bottom:8px\">Recharge<\u002Fdiv>\n        <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n          <sc-for list=\"{{ modeBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <button data-mode=\"{{ b.id }}\" onclick=\"{{ dMode }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showInt }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-if value=\"{{ notNew }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:16px\">\n            <div style=\"font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:#636b75;margin-bottom:8px\">Last done<\u002Fdiv>\n            <input type=\"date\" value=\"{{ draftLast }}\" max=\"{{ todayIso }}\" onchange=\"{{ dLast }}\" style=\"width:100%;box-sizing:b or 20 minutes',icon:'box',interval:60,seed:40},\n      {id:'mattress',area:'home',label:'Flip / rotate the mattress',icon:'bed',interval:365,seed:240},\n      {id:'networth',area:'money',label:'Update net worth',icon:'chart',interval:30,seed:20},\n      {id:'budget',area:'money',label:'Review spending',icon:'wallet',interval:30,seed:16},\n      {id:'subs',area:'money',label:'Cancel unused subscriptions',icon:'card',interval:90,seed:50},\n      {id:'goals',area:'career',label:'Review goals & priorities',icon:'target',interval:30,seed:20},\n      {id:'lifeplan',area:'career',label:'Revisit your life plan',icon:'compass',interval:180,seed:100},\n      {id:'bikeclean',area:'gear',label:'Maintain bike',icon:'bike',interval:30,seed:20},\n      {id:'family',area:'people',label:'Call family',icon:'phone',interval:14,seed:10},\n      {id:'friend',area:'people',label:'Catch up with a friend',icon:'phone',interval:10,seed:7},\n      {id:'plan',area:'people',label:'Plan something social',icon:'sun',interval:21,seed:12},\n      {id:'checkin',area:'people',label:'Check in on someone',icon:'heart',interval:21,seed:14},\n      {id:'dayoff',area:'rest',label:'Take a real day off',icon:'moon',interval:62,seed:44},\n      {id:'longwknd',area:'rest',label:'Long weekend away',icon:'sun',interval:90,chain:[{label:'Book transportation'},{label:'Book lodging'},{label:'Book events'},{label:'Take trip'}]},\n      {id:'trip',area:'rest',label:'A proper trip',icon:'plane',interval:180,chain:[{label:'Book transportation'},{label:'Book lodging'},{label:'Book events'},{label:'Take trip'}]},\n      {id:'offline',area:'rest',label:'A day fully offline',icon:'moon',interval:30,seed:18},\n      {id:'glasses',area:'health',label:'Order new glasses',icon:'eye',interval:365,seed:0,requires:['eye']},\n      {id:'roth',area:'money',label:'Backdoor Roth',icon:'refresh',interval:365,tier:'need',chain:[{label:'Contribute to a traditional IRA',m:0},{label:'Convert it to Roth',m:0},{label:'File Form 8606 at tax time',m:3,hard:true}]},\n      {id:'weightlift',area:'fitness',label:'Weightlift',icon:'dumbbell',interval:14,seed:9},\n      {id:'hsa',area:'money',label:'Max & move the HSA',icon:'pill',interval:365,tier:'need',chain:[{label:'Max the HSA',m:0},{label:'Move to Fidelity',m:0}]},\n      {id:'taxes',area:'money',label:'Do taxes',icon:'doc',interval:365,tier:'need',chain:[{label:'Gather tax documents',m:1},{label:'File taxes',m:3,hard:true}]},\n      {id:'carreg',area:'car',label:'Car registration',icon:'card',interval:365,tier:'need',chain:[{label:'Register',m:6},{label:'Pick up plates/tags',m:6}]},\n      {id:'oilchange',area:'car',label:'Oil change',icon:'refresh',interval:365,chain:[{label:'Book'},{label:'Take'}]},\n      {id:'tires',area:'car',label:'Rotate tires',icon:'clock',interval:180,seed:90},\n      {id:'carwash',area:'car',label:'Wash the car',icon:'droplet',interval:30,seed:20}\n    ];\n    this.DEFAULT_DATED=[\n      {id:'k401',area:'money',label:'Set 401(k) + after-tax (mega-backdoor)',icon:'chart',mode:'date',dueM:0,tags:['money','employer'],note:'2026 caps: $24,500 employee, $72,000 total. Set after-tax contributions plus automatic in-plan Roth conversion to fill the space above your deferral and match. Check the plan offers it, and that it won\\u2019t choke your match if you hit the cap early (true-up).'},\n      {id:'rsu',area:'money',label:'Check RSU withholding',icon:'card',mode:'date',dueM:1,tags:['money','employer'],note:'Default RSU withholding is often about 22%, below your marginal rate. Estimate the shortfall and set money aside so April isn\\u2019t a surprise. Good moment to look at how concentrated you are in employer stock.'},\n      {id:'midmoney',area:'money',label:'Mid-year money review',icon:'chart',mode:'date',dueM:5,tags:['money'],note:'Is your savings rate on track? Look at rebalance drift, emergency-fund runway (lean toward 6\\u201312 months given RSU concentration), and asset location.'},\n      {id:'oe',area:'health',label:'Open enrollment \\u2014 lock it in',icon:'heart',mode:'date',dueM:9,dueD:15,hard:true,tags:['health','employer'],note:'The one window you can\\u2019t easily redo. Health plan, HSA/FSA, life and disability, other perks. Re-elect HSA payroll contributions \\u2014 they often don\\u2019t carry over.'}\n    ];\n    this.NOTES={\n      physical:\"Book a yearly check-up with your GP. Ask for blood pressure, a basic metabolic panel, and bring a short list of anything you've been meaning to raise.\",\n      bloodwork:\"Book a fasting draw (CBC, lipids, metabolic, HbA1c). Fast 10\\u201312h, go in the morning, and save the PDF so you can compare year over year.\",\n      hormones:\"Ask your doctor for a thyroid (TSH, free T3/T4) and hormone panel. Draw before 10am for testosterone and cortisol; note any symptoms driving it.\",\n      micros:\"Check vitamin D, B12, ferritin and magnesium \\u2014 add them to a routine draw, then adjust supplements to the numbers instead of guessing.\",\n      dental:\"Book a clean and check-up with the hygienist. Flag anything sensitive, and get X-rays if it's been a while.\",\n      eye:\"See an optometrist for a sight test and retinal photo. Bring your current glasses; update the prescription if it's drifted.\",\n      derm:\"Get a full-body mole and skin check with a dermatologist. Photograph anything you're watching and flag new or changing spots.\",\n      flu:\"Walk into a pharmacy or clinic for the seasonal shot \\u2014 ten minutes. Best in early autumn, before the season peaks.\",\n      dexa:\"Book a DEXA scan for body composition and bone density. Go fasted and at a consistent time of day so scans stay comparable.\",\n      physio:\"See a physio for a movement screen. Bring your niggles and training load; leave with 2\\u20133 corrective drills and actually do them.\",\n      glasses:\"With the fresh prescription, order glasses or contacts online or in store. Spend down FSA dollars on them if you have any.\",\n      program:\"Sit down with your training log. Are you progressing? Adjust volume, swap stale lifts, and set the next block's focus.\",\n      deload:\"Take a lighter week \\u2014 roughly half the volume, nothing to failure. Let fatigue clear; keep sleep and food normal.\",\n      vo2:\"Book a lab VO2max/lactate test, or run a field test like a Cooper. Use the zones it gives to set your cardio for the next few months.\",\n      prtest:\"Warm up thoroughly, then work up to a heavy single or rep-max on your main lifts. Record the numbers and reset your training maxes.\",\n      longride:\"Block a half-day for a long ride or run. Plan the route, fuel and hydrate, and keep the effort mostly easy.\",\n      mobility:\"Spend 10\\u201315 minutes on the tight spots \\u2014 hips, ankles, T-spine. Follow a saved routine so you're not improvising.\",\n      groceries:\"Check what's low, write a list against your usual meals, and shop once so you're not back midweek.\",\n      mealprep:\"Batch a couple of proteins, a grain and some veg. Cook once, portion into containers, and label anything for the freezer.\",\n      supps:\"Reorder what's running low before you're out. Put the daily stack in one basket to save on shipping.\",\n      protein:\"Reorder protein and creatine before the tub's empty \\u2014 buy the size you actually get through so it stays fresh.\",\n      stack:\"Review the stack against recent bloodwork. Drop anything not earning its place; confirm doses and timing still make sense.\",\n      recipe:\"Pick one new recipe and actually cook it. Add the ingredients to your grocery list, and keep it if it was good.\",\n      therapy:\"Book or attend the session. Between appointments, spend the slot journalling on what's on your mind and what you want to work on.\",\n      journal:\"Do a weekly review \\u2014 what happened, what mattered, what's next. Fifteen minutes with your calendar and notes open.\",\n      meditate:\"Sit for ten minutes \\u2014 breath focus or a guided app. Same time each day (mornings are easiest) so it sticks.\",\n      wins:\"Write down a few wins and things you're grateful for. Keep a running list \\u2014 it's fuel for reviews and low days.\",\n      haircut:\"Book the barber or salon before it gets shaggy. Rebook your usual person and save their number if you keep forgetting.\",\n      skincare:\"Restock what's low \\u2014 cleanser, moisturiser, actives. Reorder together and check nothing's expired.\",\n      exfoliate:\"Exfoliate or do a mask \\u2014 about ten minutes. Follow with moisturiser and don't overdo the frequency.\",\n      sunscreen:\"Reorder before the bottle's done. Keep one by the door and one in your bag so you actually use it.\",\n      nails:\"Trim and tidy fingernails and toenails \\u2014 five minutes after a shower when they're soft.\",\n      massage:\"Book a massage or bodywork session. Tell them where you hold tension, and rebook the next one before you leave.\",\n      reset:\"Quick whole-home reset \\u2014 surfaces cleared, things back where they live, a load of laundry on. 20\\u201330 minutes.\",\n      bathroom:\"Wipe the sink, toilet, mirror and shower. Keep spray and cloths under the sink so it's a ten-minute job.\",\n      floors:\"Clear the floor, then vacuum and mop the main areas. Do the whole level while you're at it.\",\n      sheets:\"Strip and wash the bed linen and towels. Remake the bed the same day so you're not on a bare mattress.\",\n      dust:\"Dust surfaces, shelves and screens with a microfibre cloth, top-down so you're not re-dusting. Don't skip the tech.\",\n      kitchen:\"Clear the counters, then deep-wipe worktops, stovetop, splashback and sink. Hit the handles and the bin lid.\",\n      island:\"Clear it fully, wipe it down, and put back only what lives there. Flat surfaces attract clutter \\u2014 keep this one clear.\",\n      toiletries:\"Check the bathroom stock \\u2014 toothpaste, floss, razors, soap, paper. Reorder in one go before anything runs out.\",\n      fridge2:\"Toss anything past it, wipe the shelves, take stock. Do it the night before grocery day so you know what to buy.\",\n      descale:\"Descale the kettle and teaware with citric acid or vinegar \\u2014 fill, sit, rinse well. Monthly keeps limescale off.\",\n      appliances:\"Run a hot empty cycle on the dishwasher and washer with cleaner. Clear the filters and leave the doors ajar to dry.\",\n      baseboards:\"Wipe skirting boards, door handles and light switches with a damp cloth \\u2014 the high-touch spots that get missed.\",\n      bathdeep:\"Set aside an hour: grout, tiles, extractor fan, behind the loo. Proper products and some elbow grease.\",\n      windows:\"Clean windows and mirrors inside (and out where you can reach). A cloudy day means they won't streak.\",\n      filters:\"Swap or wash the air/HVAC filters. Note the size, keep a spare, and set the next date so you don't forget.\",\n      purge:\"Pick a category and clear what you don't use \\u2014 clothes, cables, kitchen clutter. Bag it for donation the same day.\",\n      declutter:\"Empty one problem drawer or shelf, bin the junk, and put the rest back with intent. One spot, start to finish.\",\n      bedding:\"Wash the pillows and duvet (check the care label). Dry them fully \\u2014 tennis balls help fluff \\u2014 before they go back.\",\n      mattress:\"Flip or rotate the mattress so it wears evenly. Vacuum it while it's exposed and air the room.\",\n      closet:\"Swap the seasonal wardrobe. Store the off-season stuff and set aside anything you didn't wear to donate.\",\n      networth:\"Pull balances across accounts, log the total in your tracker, and note what moved and why.\",\n      rebalance:\"Check allocation drift against your targets. Rebalance if a band's off \\u2014 prefer steering new contributions over selling.\",\n      budget:\"Review last month's spending by category. Flag surprises, cancel waste, and adjust next month's plan.\",\n      subs:\"Scan card and app-store statements for subscriptions. Cancel what you don't use; note the renewal dates for the rest.\",\n      credit:\"Pull your free credit report. Scan for errors or unknown accounts, dispute anything wrong, and check the score trend.\",\n      thesis:\"Revisit each holding: does the reason you bought it still hold? Trim, add or leave \\u2014 and write down why.\",\n      roth:\"Three steps: contribute non-deductible money to a traditional IRA, convert it to Roth, then file Form 8606. Zero any pre-tax IRA balance first to dodge the pro-rata rule.\",\n      hsa:\"Max the HSA for the year, then move the balance to a provider with good investment options. Keep receipts \\u2014 you can reimburse yourself years later.\",\n      taxes:\"Gather the documents as they arrive (W-2, 1099s, RSU statements), then file \\u2014 or hand the folder to your accountant early, before the rush.\",\n      carreg:\"Renew the registration before it lapses \\u2014 online if your state allows. Put the new tags on the same week they arrive.\",\n      oilchange:\"Book the oil change (or do it): oil, filter, quick fluid check. Note the mileage so the next one's easy to time.\",\n      tires:\"Rotate the tires so they wear evenly \\u2014 any shop does it fast, often free with other work. Check pressures and tread while it's up.\",\n      carwash:\"Wash it or run it through \\u2014 and clear out the trash and floor mats while you're at it. Wax if you're feeling fancy.\",\n      bragdoc:\"Add recent wins while they're fresh \\u2014 impact, numbers, who noticed. Future-you writing reviews will thank you.\",\n      oneonone:\"Jot a short agenda \\u2014 blockers, wins, asks. Send it ahead if your manager likes that.\",\n      skill:\"Spend focused time deliberately practising one skill, not just doing the job. Pick the edge of your ability and drill it.\",\n      promo:\"Move the case one step: gather evidence, align with your manager, or close a gap the rubric names.\",\n      resume:\"Refresh your resume and LinkedIn with recent work \\u2014 easiest while it's fresh, even if you're not looking.\",\n      network:\"Reach out to one person \\u2014 a coffee, a reply, a genuine check-in. No agenda; just keep the relationship warm.\",\n      goals:\"Review your goals and priorities. Are you spending time on what matters? Cut or reorder for the next stretch.\",\n      lifeplan:\"Zoom out \\u2014 career, money, health, relationships. Are the current defaults still the right ones?\",\n      bikeclean:\"Degrease and re-lube the drivetrain and wipe the frame. Twenty minutes keeps shifting crisp and parts lasting.\",\n      bikeservice:\"Book a full service (or do it): brakes, gears, bearings, bolts to torque. Before a big trip or at season's change.\",\n      watchcare:\"Wipe down watches and leather, condition the straps, wind or set anything mechanical, and store them properly.\",\n      cameracare:\"Clean the sensor and lenses, blow out dust, charge batteries and format cards \\u2014 before a shoot, not during.\",\n      backups:\"Back up photos and files to a second place (drive plus cloud). Verify the last backup actually ran and can restore.\",\n      passwords:\"Security pass: check the password manager for weak or reused logins, rotate the important ones, confirm 2FA and recovery codes.\",\n      family:\"Call family \\u2014 not a text. Put it in the calendar if it slips, and ask about them, not just logistics.\",\n      friend:\"Reach out and actually catch up. Suggest a specific time; a short call beats another 'we should hang.'\",\n      plan:\"Plan something social \\u2014 dinner, a trip, a game night. Pick a date and send the invite; someone has to be the one.\",\n      checkin:\"Check in on someone who's had a lot on. A simple 'thinking of you, how are you really?' goes a long way.\",\n      birthdays:\"Look at the month's birthdays and get ahead \\u2014 cards, gifts, plans. Set reminders so none sneak up.\",\n      shoot:\"Go out and shoot with intent \\u2014 a location, a
